# Darwin Protocol — Miden testnet deployment state.
#
# Lists every account, faucet, and contract Darwin has deployed on
# the public Miden testnet. Each entry includes the account id and
# the deploying transaction id where applicable.
#
# This file is authoritative for the SDK and the deployment scripts.
# When you deploy a new component, update this file in the same PR.

[network]
name = "miden-testnet"
chain_block_height_at_first_deployment = 695354

# Asset faucets deployed by the Darwin team. Each holds a Darwin-
# controlled signing key and mints to the Darwin test wallet.
[asset_faucets]

