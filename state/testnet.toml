# The Darwin test wallet that received the first mint from each
# faucet above. Held by the Darwin team for end-to-end test work.
[test_wallet]
account_id = "0x5230eb6eb7ba5c80335a738beaf8bc"

# A second wallet that simulates an end-user in Flow A. Used to
# exercise the wallet → controller deposit path once the controller
# bodies wire in. The team wallet has pre-funded it via a P2ID
# transfer so the user has assets to deposit.
[user_wallet]
account_id      = "0xed3cd5befa3207805f8529207cfc0d"
first_p2id_tx   = "0xfe0a531e20900297ab6e29ad92cff71e3669dc6d727a76c3b66337043c116bea"
first_p2id_asset = "1_000_000 base units of public faucet 0x0a7d175ed63ec5200fb2ced86f6aa5"

# Mints the Darwin dETH faucet did directly into the user wallet so
# the wallet holds a real basket constituent and can drive the user
# side of Flow A.
[[user_wallet_mints]]
asset    = "dETH"
faucet_id = "0xa095d9b3831e96206ff70c2218a6a9"
amount   = 5_000
mint_tx  = "0xdf09fbe2607f42fdfe2faa8197c64a9b62e738af48061b7a45b236c4e2fec095"
note_id  = "0xa35ab1642a5ab12829ddca56e9b31043c121ae3592af922a53b86307414d9ff3"

# Darwin Protocol Accounts (one per basket). Currently deployed as
# `RegularAccountUpdatableCode` accounts with placeholder procedure
# bodies (see `darwin-protocol/crates/darwin-controller-pkg/src/lib.rs`).
# Real bodies — calling the bundled `darwin::math` / `darwin::nav` /
# `darwin::mint` / `darwin::fees` / `darwin::redeem` libraries — land
# once `miden-protocol` ships built against `miden-assembly` 0.23.
[protocol_accounts]

[protocol_accounts.core_crypto]
account_id = "0xaa20da7d98c2e29022510aa786948f"
basket     = "DCC"

[protocol_accounts.aggressive]
account_id = "0x53c54781b7b091905a948b5e3f92fe"
basket     = "DAG"

[protocol_accounts.conservative]
account_id = "0xa3a0e023381d709060a19527e73f95"
basket     = "DCO"

