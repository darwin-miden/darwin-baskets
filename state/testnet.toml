# Darwin Protocol — Miden testnet deployment state.
#
# Lists every account, faucet, and contract Darwin has deployed on
# the public Miden testnet. Each entry includes the account id and
# the deploying transaction id where applicable.
#
# This file is authoritative for the SDK and the deployment scripts.
# When you deploy a new component, update this file in the same PR.

[network]
name = "miden-testnet"
chain_block_height_at_first_deployment = 695354

# Asset faucets deployed by the Darwin team. Each holds a Darwin-
# controlled signing key and mints to the Darwin test wallet.
[asset_faucets]

[asset_faucets.dETH]
account_id     = "0xa095d9b3831e96206ff70c2218a6a9"
symbol         = "DETH"
decimals       = 18
max_supply     = 10_000_000
deployed_by_tx = "0xd2645c81130aafea22c638ef35833b72c2960d8d05845b584ee9dc294c3909e7"

[asset_faucets.dWBTC]
account_id     = "0x7a45cb24ada22120246bcf54196e12"
symbol         = "DWBTC"
decimals       = 8
max_supply     = 1_000_000
deployed_by_tx = "0x33c2c0248d28f9caee2bcbc474146472a886c082b77986e3873ffa5019d72d99"

[asset_faucets.dUSDT]
account_id     = "0xd3789f451ddd4720602ba9eb1a268d"
symbol         = "DUSDT"
decimals       = 6
max_supply     = 1_000_000_000
deployed_by_tx = "0x32cd61c2500c257e60a8026541e65208024e6b4345af5f949a681954cae0f90a"

[asset_faucets.dDAI]
